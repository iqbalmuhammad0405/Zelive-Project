version: '3.8'
services:
  laravel.test:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      WWWUSER: '\'
      LARAVEL_SAIL: 1
      XDEBUG_MODE: '\'
      XDEBUG_CONFIG: '\'
    volumes:
      - './backend:/var/www/html'
    networks:
      - sail
    depends_on:
      - mysql
      - redis
  mysql:
    image: 'mysql/mysql-server:8.0'
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: '\'
      MYSQL_ROOT_HOST: "%"
      MYSQL_DATABASE: '\'
      MYSQL_USER: '\'
      MYSQL_PASSWORD: '\'
      MYSQL_ALLOW_EMPTY_PASSWORD: 1
    networks:
      - sail
  redis:
    image: 'redis:alpine'
    ports:
      - "6379:6379"
    networks:
      - sail
networks:
  sail:
    driver: bridge
